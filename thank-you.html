<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | TGPCET IT Department</title>
    <link rel="icon" type="image/png" href="images/college-logo/tgpcet-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .bg-animation { position:absolute; width:100%; height:100%; overflow:hidden; z-index:0; }
        .bg-animation span {
            position:absolute; display:block; width:20px; height:20px;
            background:rgba(59,130,246,0.08); animation:float 25s infinite; border-radius:50%;
        }
        .bg-animation span:nth-child(1){left:10%;animation-delay:0s;}
        .bg-animation span:nth-child(2){left:25%;animation-delay:3s;width:30px;height:30px;}
        .bg-animation span:nth-child(3){left:45%;animation-delay:6s;}
        .bg-animation span:nth-child(4){left:65%;animation-delay:9s;width:25px;height:25px;}
        .bg-animation span:nth-child(5){left:80%;animation-delay:12s;}
        @keyframes float {
            0%{transform:translateY(100vh);opacity:0;}
            10%{opacity:0.6;}90%{opacity:0.3;}
            100%{transform:translateY(-100vh);opacity:0;}
        }
        .container {
            position:relative; z-index:1; text-align:center;
            padding:3rem 2.5rem; max-width:680px; width:90%;
            background:rgba(255,255,255,0.03);
            backdrop-filter:blur(20px);
            border-radius:24px;
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:0 20px 60px rgba(0,0,0,0.5);
            animation:slideUp 0.8s ease-out;
        }
        @keyframes slideUp {
            from{opacity:0;transform:translateY(40px);}
            to{opacity:1;transform:translateY(0);}
        }
        .icon-wrap {
            width:90px; height:90px; margin:0 auto 1.5rem;
            background:linear-gradient(135deg,#3b82f6,#8b5cf6);
            border-radius:50%; display:flex; align-items:center; justify-content:center;
            box-shadow:0 8px 30px rgba(59,130,246,0.4);
            animation:scaleIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
        }
        @keyframes scaleIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
        .icon-wrap i { font-size:2.5rem; color:#fff; }
        h1 {
            font-size:2.2rem; font-weight:800;
            background:linear-gradient(135deg,#3b82f6,#8b5cf6);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text; margin-bottom:0.75rem;
        }
        .subtitle { color:#94a3b8; font-size:1rem; line-height:1.7; margin-bottom:2rem; }

        /* Summary card */
        .summary {
            background:rgba(59,130,246,0.06);
            border:1px solid rgba(59,130,246,0.15);
            border-radius:14px; padding:1.5rem; text-align:left; margin-bottom:2rem;
        }
        .summary-title {
            font-size:0.7rem; letter-spacing:3px; text-transform:uppercase;
            color:#3b82f6; font-weight:600; margin-bottom:1rem;
        }
        .summary-row {
            display:flex; gap:0.75rem; padding:0.6rem 0;
            border-bottom:1px solid rgba(255,255,255,0.05);
            align-items:flex-start;
        }
        .summary-row:last-child { border-bottom:none; }
        .summary-row i { color:#3b82f6; width:16px; margin-top:2px; flex-shrink:0; font-size:0.85rem; }
        .summary-label { color:#64748b; font-size:0.82rem; min-width:70px; flex-shrink:0; }
        .summary-value { color:#e2e8f0; font-size:0.9rem; word-break:break-word; }

        /* Buttons */
        .btn-group { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-bottom:2rem; }
        .btn {
            padding:0.8rem 1.8rem; border-radius:50px; font-weight:600;
            text-decoration:none; display:inline-flex; align-items:center;
            gap:0.5rem; font-size:0.95rem; cursor:pointer; border:none; transition:all 0.3s;
        }
        .btn-primary {
            background:linear-gradient(135deg,#3b82f6,#8b5cf6); color:#fff;
            box-shadow:0 8px 25px rgba(59,130,246,0.3);
        }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 35px rgba(59,130,246,0.5); }
        .btn-outline {
            background:rgba(255,255,255,0.05); color:#94a3b8;
            border:1px solid rgba(255,255,255,0.1);
        }
        .btn-outline:hover { background:rgba(255,255,255,0.1); color:#fff; transform:translateY(-2px); }
        .btn-pdf {
            background:linear-gradient(135deg,#10b981,#059669); color:#fff;
            box-shadow:0 8px 25px rgba(16,185,129,0.3);
        }
        .btn-pdf:hover { transform:translateY(-2px); box-shadow:0 12px 35px rgba(16,185,129,0.5); }

        /* Footer credit */
        .credit {
            padding-top:1.5rem;
            border-top:1px solid rgba(255,255,255,0.06);
            color:#334155; font-size:0.78rem; letter-spacing:0.5px;
        }
        .credit span { color:#475569; }
    </style>
</head>
<body>
    <div class="bg-animation">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="container">
        <div class="icon-wrap"><i class="fas fa-check"></i></div>
        <h1>Message Sent!</h1>
        <p class="subtitle">Thank you for reaching out to the IT Department, TGPCET Nagpur.<br>We will get back to you shortly.</p>

        <!-- Summary -->
        <div class="summary">
            <div class="summary-title">Submission Summary</div>
            <div class="summary-row">
                <i class="fas fa-user"></i>
                <span class="summary-label">Name</span>
                <span class="summary-value" id="s-name">—</span>
            </div>
            <div class="summary-row">
                <i class="fas fa-envelope"></i>
                <span class="summary-label">Email</span>
                <span class="summary-value" id="s-email">—</span>
            </div>
            <div class="summary-row">
                <i class="fas fa-phone"></i>
                <span class="summary-label">Phone</span>
                <span class="summary-value" id="s-phone">—</span>
            </div>
            <div class="summary-row">
                <i class="fas fa-tag"></i>
                <span class="summary-label">Subject</span>
                <span class="summary-value" id="s-subject">—</span>
            </div>
            <div class="summary-row">
                <i class="fas fa-comment-alt"></i>
                <span class="summary-label">Message</span>
                <span class="summary-value" id="s-message">—</span>
            </div>
            <div class="summary-row">
                <i class="fas fa-clock"></i>
                <span class="summary-label">Submitted</span>
                <span class="summary-value" id="s-date">—</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-pdf" onclick="downloadPDF()">
                <i class="fas fa-file-pdf"></i> Download Receipt
            </button>
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <a href="contact.html" class="btn btn-outline">
                <i class="fas fa-envelope"></i> Send Another
            </a>
        </div>

        <div class="credit">Developed by <span>IT Department, TGPCET Nagpur</span></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = {
            name:    params.get('name')    || 'N/A',
            email:   params.get('email')   || 'N/A',
            phone:   params.get('phone')   || 'N/A',
            subject: params.get('subject') || 'N/A',
            message: params.get('message') || 'N/A',
            date:    params.get('date')    || new Date().toLocaleDateString('en-IN'),
            time:    params.get('time')    || new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'})
        };

        document.getElementById('s-name').textContent    = data.name;
        document.getElementById('s-email').textContent   = data.email;
        document.getElementById('s-phone').textContent   = data.phone;
        document.getElementById('s-subject').textContent = data.subject;
        document.getElementById('s-message').textContent = data.message;
        document.getElementById('s-date').textContent    = data.date + ' at ' + data.time;

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
            const W = 210, margin = 20;

            // Dark header background
            doc.setFillColor(15, 23, 42);
            doc.rect(0, 0, W, 297, 'F');

            // Header bar
            doc.setFillColor(30, 41, 59);
            doc.rect(0, 0, W, 55, 'F');

            // Blue accent line
            doc.setFillColor(59, 130, 246);
            doc.rect(0, 53, W, 2, 'F');

            // College name
            doc.setTextColor(148, 163, 184);
            doc.setFontSize(8);
            doc.setFont('helvetica', 'normal');
            doc.text('TULSIRAMJI GAIKWAD-PATIL COLLEGE OF ENGINEERING & TECHNOLOGY, NAGPUR', W/2, 14, {align:'center'});

            // Dept name
            doc.setTextColor(226, 232, 240);
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.text('Department of Information Technology', W/2, 26, {align:'center'});

            // Receipt title
            doc.setTextColor(96, 165, 250);
            doc.setFontSize(11);
            doc.setFont('helvetica', 'normal');
            doc.text('MESSAGE RECEIPT', W/2, 38, {align:'center'});

            // Ref number
            const ref = 'TGPCET-IT-' + Date.now().toString().slice(-6);
            doc.setTextColor(100, 116, 139);
            doc.setFontSize(8);
            doc.text('Ref: ' + ref, W/2, 47, {align:'center'});

            // Content area
            let y = 72;

            // Section: Sender Details
            doc.setFillColor(30, 41, 59);
            doc.roundedRect(margin, y-6, W - margin*2, 8, 2, 2, 'F');
            doc.setTextColor(96, 165, 250);
            doc.setFontSize(9);
            doc.setFont('helvetica', 'bold');
            doc.text('SENDER DETAILS', margin + 4, y, {});
            y += 10;

            const fields = [
                ['Full Name',    data.name],
                ['Email Address',data.email],
                ['Phone Number', data.phone],
            ];

            fields.forEach(([label, value]) => {
                doc.setTextColor(100, 116, 139);
                doc.setFontSize(8.5);
                doc.setFont('helvetica', 'normal');
                doc.text(label + ':', margin + 2, y);
                doc.setTextColor(226, 232, 240);
                doc.setFont('helvetica', 'bold');
                doc.text(value, margin + 50, y);
                // underline
                doc.setDrawColor(51, 65, 85);
                doc.line(margin, y + 2, W - margin, y + 2);
                y += 10;
            });

            y += 6;

            // Section: Message Details
            doc.setFillColor(30, 41, 59);
            doc.roundedRect(margin, y-6, W - margin*2, 8, 2, 2, 'F');
            doc.setTextColor(96, 165, 250);
            doc.setFontSize(9);
            doc.setFont('helvetica', 'bold');
            doc.text('MESSAGE DETAILS', margin + 4, y);
            y += 10;

            // Subject
            doc.setTextColor(100, 116, 139);
            doc.setFontSize(8.5);
            doc.setFont('helvetica', 'normal');
            doc.text('Subject:', margin + 2, y);
            doc.setTextColor(226, 232, 240);
            doc.setFont('helvetica', 'bold');
            doc.text(data.subject, margin + 50, y);
            doc.setDrawColor(51, 65, 85);
            doc.line(margin, y + 2, W - margin, y + 2);
            y += 12;

            // Message box
            doc.setTextColor(100, 116, 139);
            doc.setFontSize(8.5);
            doc.setFont('helvetica', 'normal');
            doc.text('Message:', margin + 2, y);
            y += 6;

            doc.setFillColor(22, 33, 51);
            const msgLines = doc.splitTextToSize(data.message, W - margin*2 - 8);
            const msgBoxH = msgLines.length * 5.5 + 8;
            doc.roundedRect(margin, y, W - margin*2, msgBoxH, 3, 3, 'F');
            doc.setTextColor(203, 213, 225);
            doc.setFontSize(9);
            doc.text(msgLines, margin + 4, y + 6);
            y += msgBoxH + 12;

            // Submission time
            doc.setFillColor(30, 41, 59);
            doc.roundedRect(margin, y-6, W - margin*2, 8, 2, 2, 'F');
            doc.setTextColor(96, 165, 250);
            doc.setFontSize(9);
            doc.setFont('helvetica', 'bold');
            doc.text('SUBMISSION INFO', margin + 4, y);
            y += 10;

            doc.setTextColor(100, 116, 139);
            doc.setFontSize(8.5);
            doc.setFont('helvetica', 'normal');
            doc.text('Date & Time:', margin + 2, y);
            doc.setTextColor(226, 232, 240);
            doc.setFont('helvetica', 'bold');
            doc.text(data.date + ' at ' + data.time, margin + 50, y);
            doc.setDrawColor(51, 65, 85);
            doc.line(margin, y + 2, W - margin, y + 2);
            y += 10;

            doc.setTextColor(100, 116, 139);
            doc.setFont('helvetica', 'normal');
            doc.text('Reference No:', margin + 2, y);
            doc.setTextColor(226, 232, 240);
            doc.setFont('helvetica', 'bold');
            doc.text(ref, margin + 50, y);

            // Footer
            doc.setFillColor(30, 41, 59);
            doc.rect(0, 272, W, 25, 'F');
            doc.setFillColor(59, 130, 246);
            doc.rect(0, 272, W, 1, 'F');

            doc.setTextColor(148, 163, 184);
            doc.setFontSize(8);
            doc.setFont('helvetica', 'normal');
            doc.text('This is an auto-generated receipt. Please keep it for your records.', W/2, 281, {align:'center'});

            doc.setTextColor(71, 85, 105);
            doc.setFontSize(7.5);
            doc.text('Developed by IT Department, TGPCET Nagpur  |  hod.it@tgpcet.com  |  +91 97660 85909', W/2, 289, {align:'center'});

            doc.save('TGPCET_IT_Message_Receipt_' + data.name.replace(/\s+/g,'_') + '.pdf');
        }
    </script>
</body>
</html>
